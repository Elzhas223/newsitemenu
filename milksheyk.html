<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Милкшейк — Brilliant Menu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-shell">
    <div class="container topbar">
      <a class="brand" href="index.html">
        <span class="brand__eyebrow">Brilliant Lounge Bar</span>
        <span class="brand__title">Brilliant Menu</span>
      </a>
</div>
  </header>
  <main class="page page--products">
    <div class="container">
      <nav class="breadcrumbs reveal">
        <a href="index.html">Главная</a>
        <span>/</span>
        <a href="index.html">Меню</a>
        <span>/</span>
        <strong>Милкшейк</strong>
      </nav>

      <div class="section-heading section-heading--products reveal">
        <div>
          <p class="eyebrow">BRILLIANT MENU</p>
          <h1>Милкшейк</h1>
          <p class="section-heading__text">Сладкие молочные коктейли.</p>
        </div>
        <div class="section-heading__side">
          <a class="ghost-link" href="index.html">← Назад в меню</a>
          <div class="service-pill">Обслуживание 10%</div>
          <label class="menu-search menu-search--compact" for="menuSearch">
            <span class="menu-search__icon" aria-hidden="true">⌕</span>
            <input id="menuSearch" type="search" placeholder="Поиск блюд" autocomplete="off">
          </label>
        </div>
      </div>

      <section class="product-grid">
        
        <article class="product-card reveal" style="--delay:0ms">
          <div class="product-card__image-wrap">
            <img src="placeholders-no-photo.svg" alt="БАНАНОВЫЙ" loading="lazy">
          </div>
          <div class="product-card__body">
            <h3>БАНАНОВЫЙ</h3>
            <p class="product-card__desc">0,450МЛ</p>
            <div class="product-card__footer">
              <div>
                <div class="price">1 490 ₸</div>
              </div>
            </div>
          </div>
        </article>
        <article class="product-card reveal" style="--delay:45ms">
          <div class="product-card__image-wrap">
            <img src="placeholders-no-photo.svg" alt="ЯГОДНЫЙ" loading="lazy">
          </div>
          <div class="product-card__body">
            <h3>ЯГОДНЫЙ</h3>
            <p class="product-card__desc">0,450МЛ</p>
            <div class="product-card__footer">
              <div>
                <div class="price">1 490 ₸</div>
              </div>
            </div>
          </div>
        </article>
        <article class="product-card reveal" style="--delay:90ms">
          <div class="product-card__image-wrap">
            <img src="placeholders-no-photo.svg" alt="ШОКОЛАДНЫЙ" loading="lazy">
          </div>
          <div class="product-card__body">
            <h3>ШОКОЛАДНЫЙ</h3>
            <p class="product-card__desc">0,450МЛ</p>
            <div class="product-card__footer">
              <div>
                <div class="price">1 490 ₸</div>
              </div>
            </div>
          </div>
        </article>
      </section>
      <p class="empty-state" id="menuEmpty" hidden>Ничего не найдено</p>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
