<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Фрэш — Brilliant Menu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-shell">
    <div class="container topbar">
      <a class="brand" href="index.html">
        <span class="brand__eyebrow">Brilliant Lounge Bar</span>
        <span class="brand__title">Brilliant Menu</span>
      </a>
      <div class="header-actions" aria-label="Contacts">
        <a class="social-link social-link--instagram" href="https://www.instagram.com/brilliant.zhezkazgan" target="_blank" rel="noopener" aria-label="Instagram">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3.5" y="3.5" width="17" height="17" rx="5"></rect>
            <circle cx="12" cy="12" r="4.1"></circle>
            <circle cx="17.2" cy="6.8" r="1.1"></circle>
          </svg>
        </a>
        <a class="social-link social-link--whatsapp" href="https://wa.me/77764587788" target="_blank" rel="noopener" aria-label="WhatsApp">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20.3 11.8a8.2 8.2 0 0 1-12.1 7.2L4 20.2l1.3-4a8.1 8.1 0 1 1 15-4.4Z"></path>
            <path d="M8.8 8.2c.2-.5.4-.6.8-.6h.5c.2 0 .4.1.5.4l.8 1.8c.1.3.1.5-.1.7l-.5.6c-.1.1-.2.3-.1.5.5 1 1.4 1.9 2.5 2.4.2.1.4.1.5-.1l.7-.8c.2-.2.4-.2.7-.1l1.8.8c.3.1.4.3.4.6 0 .6-.2 1.1-.6 1.5-.4.4-1 .6-1.8.5-3-.4-6.7-3.5-7.3-6.8-.2-.6 0-1 .2-1.4Z"></path>
          </svg>
        </a>
      </div>
</div>
  </header>
  <main class="page page--products page--fresh">
    <div class="container">
      <nav class="breadcrumbs reveal">
        <a href="index.html">Главная</a>
        <span>/</span>
        <a href="index.html">Меню</a>
        <span>/</span>
        <strong>Фрэш</strong>
      </nav>

      <div class="section-heading section-heading--products reveal">
        <div>
          <p class="eyebrow">BRILLIANT MENU</p>
          <h1>Фрэш</h1>
          <p class="section-heading__text">Натуральные свежевыжатые соки.</p>
        </div>
        <div class="section-heading__side">
          <a class="ghost-link" href="index.html">← Назад в меню</a>
          <div class="service-pill">Обслуживание 10%</div>
          <label class="menu-search menu-search--compact" for="menuSearch">
            <span class="menu-search__icon" aria-hidden="true">⌕</span>
            <input id="menuSearch" type="search" placeholder="Поиск блюд" autocomplete="off">
          </label>
        </div>
      </div>

      <section class="product-grid">
        
        <article class="product-card reveal" style="--delay:0ms">
          <div class="product-card__image-wrap">
            <img src="products-fresh-orange-fresh-final.png" alt="АПЕЛЬСИН" loading="lazy">
          </div>
          <div class="product-card__body">
            <h3>АПЕЛЬСИН</h3>
            <p class="product-card__desc">450МЛ</p>
            <div class="product-card__footer">
              <div>
                <div class="price">1 990 ₸</div>
              </div>
            </div>
          </div>
        </article>
        <article class="product-card reveal" style="--delay:45ms">
          <div class="product-card__image-wrap">
            <img src="products-fresh-apple-fresh-final.png" alt="ЯБЛОКО" loading="lazy">
          </div>
          <div class="product-card__body">
            <h3>ЯБЛОКО</h3>
            <p class="product-card__desc">450МЛ</p>
            <div class="product-card__footer">
              <div>
                <div class="price">1 790 ₸</div>
              </div>
            </div>
          </div>
        </article>
        <article class="product-card reveal" style="--delay:90ms">
          <div class="product-card__image-wrap">
            <img src="products-fresh-pomegranate-fresh-final.png" alt="ГРАНАТ" loading="lazy">
          </div>
          <div class="product-card__body">
            <h3>ГРАНАТ</h3>
            <p class="product-card__desc">450МЛ</p>
            <div class="product-card__footer">
              <div>
                <div class="price">2 390 ₸</div>
              </div>
            </div>
          </div>
        </article>
        <article class="product-card reveal" style="--delay:135ms">
          <div class="product-card__image-wrap">
            <img src="products-fresh-grapefruit-fresh-final.png" alt="ГЕЙПФРУТ" loading="lazy">
          </div>
          <div class="product-card__body">
            <h3>ГЕЙПФРУТ</h3>
            <p class="product-card__desc">450МЛ</p>
            <div class="product-card__footer">
              <div>
                <div class="price">2 390 ₸</div>
              </div>
            </div>
          </div>
        </article>
      </section>
      <p class="empty-state" id="menuEmpty" hidden>Ничего не найдено</p>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
